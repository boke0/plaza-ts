# This workflow will run tests using node and then publish a package to npm
# when a release is created. Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN
# secret is required; configure the trusted publisher on npmjs.com.
# https://docs.npmjs.com/trusted-publishers

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: npm install -g npm@latest
      - run: npm publish --provenance --access public
